name: Daily Reports Check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python monitor.py
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_API_BASE: ${{ vars.GLM_API_BASE }}
          GLM_MODEL: ${{ vars.GLM_MODEL }}
          HUB_URL: ${{ vars.HUB_URL }}

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479577c7f40049030e # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e7430d0216b4e4f73b28b95b157b1c0e # v3.0.1
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@d6db90d64ac5ed9a9ddc04ea610a1e259d4e17b4 # v4.0.5
